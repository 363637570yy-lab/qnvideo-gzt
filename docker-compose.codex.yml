services:
  backend:
    container_name: qnvideo-gzt-backend
    build:
      context: ./backend-node
      dockerfile: Dockerfile.codex
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-before-first-login}
      PGHOST: ${PGHOST:-host.docker.internal}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-qnvideo_gzt}
      PGUSER: ${PGUSER:-qnvideo_gzt}
      PGPASSWORD: ${PGPASSWORD:-}
      PORT: 5679
      SERVER_HOST: 0.0.0.0
      LEGACY_SQLITE_DB_PATH: /app/data/drama_generator.db
      STORAGE_LOCAL_PATH: /app/data/storage
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-http://localhost:20880/static}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      all_proxy: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,backend,qnvideo-gzt-backend,host.docker.internal,192.168.0.0/16,172.16.0.0/12,10.0.0.0/8}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,::1,backend,qnvideo-gzt-backend,host.docker.internal,192.168.0.0/16,172.16.0.0/12,10.0.0.0/8}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:20881:5679"

  web:
    container_name: qnvideo-gzt-web
    build:
      context: ./frontweb
      dockerfile: Dockerfile.codex
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "0.0.0.0:20880:80"
